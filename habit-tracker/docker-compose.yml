version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: habit_postgres
    environment:
      POSTGRES_USER: habit_user
      POSTGRES_PASSWORD: habit_pass
      POSTGRES_DB: habit_tracker
    ports:
      # host 5433: 5432 on this machine is taken by another dev postgres
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habit_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./services/backend
    container_name: habit_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://habit_user:habit_pass@postgres:5432/habit_tracker
      POSTGRES_USER: habit_user
      POSTGRES_PASSWORD: habit_pass
      POSTGRES_DB: habit_tracker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      API_KEY: ${API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./services/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./services/frontend
    container_name: habit_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
