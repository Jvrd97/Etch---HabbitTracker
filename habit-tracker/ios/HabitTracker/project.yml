# [review:need-review] PHASE-01/03-ios-scaffold-settings
# summary: XcodeGen spec for HabitTracker iOS app + unit-test bundle (hosted tests for Keychain access)
name: HabitTracker
options:
  bundleIdPrefix: com.habittracker
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  HabitTracker:
    type: application
    platform: iOS
    sources:
      - HabitTracker
    info:
      path: HabitTracker/Info.plist
      properties:
        UILaunchScreen: {}
        # Dev app talks to a local backend over plain HTTP (localhost / Tailscale IP).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
  HabitTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HabitTrackerTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HabitTracker
schemes:
  HabitTracker:
    build:
      targets:
        HabitTracker: all
    test:
      targets:
        - HabitTrackerTests
